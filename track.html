<style id="ghost-motion-css">
/* Pre-animation states — prevent flash of unstyled content */
.hero-title,.hero-sub,.hero-reg-wrap,.hero-stats,header{
  will-change:transform,opacity;
}
/* Smooth scroll */
html{scroll-behavior:smooth}
/* Cursor */
*{cursor:none!important}
#ghost-cursor{
  position:fixed;width:10px;height:10px;
  background:var(--gold,#c5a059);border-radius:50%;
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  transition:width .2s,height .2s,background .2s;
  mix-blend-mode:difference;
}
#ghost-cursor-ring{
  position:fixed;width:36px;height:36px;
  border:1px solid rgba(197,160,89,.5);border-radius:50%;
  pointer-events:none;z-index:99998;
  transform:translate(-50%,-50%);
  transition:all .12s ease;
}
a:hover ~ #ghost-cursor, button:hover ~ #ghost-cursor{
  width:20px;height:20px;
}
</style>
<div id="ghost-cursor"></div>
<div id="ghost-cursor-ring"></div>
<script>
(function(){
  var cur = document.getElementById('ghost-cursor');
  var ring = document.getElementById('ghost-cursor-ring');
  if(!cur||!ring) return;
  var mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',function(e){
    mx=e.clientX;my=e.clientY;
    cur.style.left=mx+'px';cur.style.top=my+'px';
  });
  function animRing(){
    rx+=(mx-rx)*.12;ry+=(my-ry)*.12;
    ring.style.left=rx+'px';ring.style.top=ry+'px';
    requestAnimationFrame(animRing);
  }
  animRing();
  // Expand on hover
  document.querySelectorAll('a,button,[onclick]').forEach(function(el){
    el.addEventListener('mouseenter',function(){
      cur.style.width='16px';cur.style.height='16px';
      ring.style.width='52px';ring.style.height='52px';
      ring.style.borderColor='rgba(197,160,89,.8)';
    });
    el.addEventListener('mouseleave',function(){
      cur.style.width='10px';cur.style.height='10px';
      ring.style.width='36px';ring.style.height='36px';
      ring.style.borderColor='rgba(197,160,89,.5)';
    });
  });
})();
</script>
